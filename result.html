<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            width:500px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#28a745;
            margin-bottom:20px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }

        a:hover{
            background:#0056b3;
        }
    </style>

</head>
<body>

    <div class="container">

        <h1>Prediction Result</h1>

        <h2>{{ result }}</h2>

        <a href="/">Predict Again</a>

    </div>

</body>
</html>
