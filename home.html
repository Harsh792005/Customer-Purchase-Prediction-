<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Purchase Prediction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f5f5f5;
}

nav{
    background:#8B0000;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.hero{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-content h1{
    font-size:50px;
    color:#8B0000;
}

.hero-content p{
    margin-top:15px;
    font-size:20px;
    color:#555;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#8B0000;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Purchase Predictor</div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/predictpage">Prediction</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>Customer Purchase Prediction</h1>
        <p>Machine Learning Based Prediction System</p>
        <a href="/predictpage" class="btn">Start Prediction</a>
    </div>
</div>

</body>
</html>
